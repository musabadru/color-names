<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Names</title>
    <!-- NeoBrutalism CSS -->
    <link rel="stylesheet" href="https://unpkg.com/neobrutalismcss@latest" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="nb-header">
        <h1>Color Names</h1>
        <p>A curated collection of beautiful, vibrant colors for Neo-Brutalist designs. Click any card to copy the hex code.</p>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for a color name or hex..." autocomplete="off">
        </div>
    </header>

    <main class="container">
        <div id="color-grid" class="color-grid">
            <!-- Color cards generated by JS -->
        </div>
    </main>

    <div id="toast" class="toast">Color copied!</div>

    <script src="script.js"></script>
</body>
</html>
